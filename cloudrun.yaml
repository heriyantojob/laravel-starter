apiVersion: serving.knative.dev/v1
kind: Service

metadata:
  name: ${APP_NAME}

spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: ${PROJECT_NAME}:asia-southeast2:${CLOUDSQL_INSTANCE}

    spec:
      containerConcurrency: 80
      timeoutSeconds: 300

      containers:
        - image: gcr.io/${PROJECT_NAME}/${APP_NAME}:latest

          ports:
            - containerPort: 8080

          env:
            - name: APP_NAME
              value: "${APP_NAME}"

            - name: APP_ENV
              value: "production"

            - name: APP_KEY
              value: "${APP_KEY}"

            - name: APP_DEBUG
              value: "false"

            - name: APP_URL
              value: "https://example.com"

            - name: FRONTEND_URL
              value: "https://example.com"

            - name: LOG_CHANNEL
              value: "stack"

            - name: LOG_LEVEL
              value: "error"

            # ======================
            # DATABASE CONFIG
            # ======================
            - name: DB_CONNECTION
              value: "mysql"

            - name: DB_HOST
              value: "127.0.0.1"

            - name: DB_PORT
              value: "3306"

            - name: DB_DATABASE
              value: "${DATABASE_NAME}"

            - name: DB_USERNAME
              value: "${DB_USERNAME}"

            - name: DB_PASSWORD
              value: "${DB_PASSWORD}"

            - name: DB_SOCKET
              value: "/cloudsql/${PROJECT_NAME}:asia-southeast2:${CLOUDSQL_INSTANCE}"

            # ======================
            # CACHE / SESSION
            # ======================
            - name: CACHE_DRIVER
              value: "file"

            - name: SESSION_DRIVER
              value: "file"

            - name: QUEUE_CONNECTION
              value: "sync"

            - name: FILESYSTEM_DISK
              value: "local"

            # ======================
            # MAIL (OPTIONAL)
            # ======================
            - name: MAIL_MAILER
              value: "smtp"

            - name: MAIL_HOST
              value: "mailpit"

            - name: MAIL_PORT
              value: "1025"

            - name: MAIL_USERNAME
              value: "null"

            - name: MAIL_PASSWORD
              value: "null"

            - name: MAIL_ENCRYPTION
              value: "null"

            - name: MAIL_FROM_ADDRESS
              value: "hello@example.com"

            - name: MAIL_FROM_NAME
              value: "${APP_NAME}"

          resources:
            limits:
              cpu: "1"
              memory: "512Mi"